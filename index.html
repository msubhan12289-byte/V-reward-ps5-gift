<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V Reward - PS5 Pro Mega Giveaway</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <style>
        .neon-glow {
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.5), 0 0 40px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-slate-900 border border-cyan-500 rounded-2xl p-6 max-w-md w-full text-center neon-glow">
        <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-2 tracking-wider">
            V REWARD GIVEAWAY
        </h1>
        <p class="text-slate-400 text-xs mb-4 uppercase tracking-widest">Win a Free PlayStation 5 Pro</p>

        <!-- Auth Section -->
        <div id="auth-section" class="space-y-4">
            <input id="email" type="email" placeholder="Enter Email Address" class="w-full p-3 bg-slate-800 border border-slate-700 rounded-lg focus:outline-none focus:border-cyan-400 text-sm">
            <input id="password" type="password" placeholder="Enter Password" class="w-full p-3 bg-slate-800 border border-slate-700 rounded-lg focus:outline-none focus:border-cyan-400 text-sm">
            <div class="flex gap-2">
                <button onclick="login()" class="w-1/2 bg-cyan-600 hover:bg-cyan-500 py-3 rounded-lg font-bold transition text-sm">Login</button>
                <button onclick="register()" class="w-1/2 bg-slate-800 hover:bg-slate-700 py-3 rounded-lg font-bold transition border border-slate-600 text-sm">Register</button>
            </div>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboard-section" class="hidden space-y-6">
            
            <!-- PS5 Pro Image Section -->
            <div class="flex flex-col items-center justify-center bg-slate-950 p-4 rounded-xl border border-slate-800">
                <img src="Screenshot_20260702_145206.jpg" alt="PS5 Pro" class="w-48 h-auto object-contain drop-shadow-[0_0_15px_rgba(6,182,212,0.5)]">
                
                <!-- Instruction Text -->
                <p class="text-[11px] text-emerald-400 font-medium uppercase tracking-wider mt-4">complete survey earn ps5 pro</p>
            </div>
            
            <p id="user-display-email" class="text-xs text-slate-500 italic"></p>

            <!-- Surveys Area -->
            <div class="space-y-3 text-left">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Available Tasks:</h3>

                <!-- Single Premium USA Smart Survey Box -->
                <button onclick="openSurvey('https://tundrafile.com/1903645', 1)" class="w-full text-left bg-gradient-to-r from-cyan-600 to-blue-600 p-5 rounded-xl font-bold flex justify-between items-center hover:opacity-90 transition shadow-lg focus:outline-none">
                    <div class="text-left">
                        <p class="text-base">🔥 Premium USA Smart Survey</p>
                        <p class="text-xs text-cyan-100 font-normal mt-0.5">Complete this survey to lock your PS5 Pro entry</p>
                    </div>
                </button>
            </div>

            <button onclick="logout()" class="text-xs text-slate-500 hover:text-red-400 transition underline block mx-auto">Logout Account</button>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
          apiKey: "AIzaSyDLyKnCJbv_DGzdpAVjtft_A-gfdP4-D2M",
          authDomain: "free-reward-f7644.firebaseapp.com",
          databaseURL: "https://free-reward-f7644-default-rtdb.firebaseio.com",
          projectId: "free-reward-f7644",
          storageBucket: "free-reward-f7644.firebasestorage.app",
          messagingSenderId: "765331223999",
          appId: "1:765331223999:web:0ca123055c90376fd31d0a",
          measurementId: "G-N96G5QFZRX"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        let globalUserId = "";

        // Monitor Login/Logout Status
        auth.onAuthStateChanged(user => {
            if (user) {
                globalUserId = user.uid;
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('dashboard-section').classList.remove('hidden');
                document.getElementById('user-display-email').innerText = `User ID: ${user.uid}`;
            } else {
                globalUserId = "";
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('dashboard-section').classList.add('hidden');
            }
        });

        // Account Register Function
        function register() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if(!email || !password) return alert("Please fill details!");

            auth.createUserWithEmailAndPassword(email, password)
                .then(cred => {
                    return database.ref('users/' + cred.user.uid).set({
                        email: email,
                        points: 0,
                        surveys_done: 0
                    });
                })
                .catch(err => alert("Register Error: " + err.message));
        }

        // Account Login Function
        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if(!email || !password) return alert("Please fill details!");

            auth.signInWithEmailAndPassword(email, password)
                .catch(err => alert("Login Error: " + err.message));
        }

        // Logout Function
        function logout() {
            auth.signOut();
        }

        // Direct Survey Opener and Database Tracker
        function openSurvey(url, taskNumber) {
            if (!globalUserId) return alert("Please login first!");

            // Track into Firebase backend
            const userRef = database.ref('users/' + globalUserId);
            userRef.transaction(currentData => {
                if (currentData) {
                    currentData.points = (currentData.points || 0) + 3;
                    currentData.surveys_done = (currentData.surveys_done || 0) + 1;
                }
                return currentData;
            });

            // Open clean tab
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
